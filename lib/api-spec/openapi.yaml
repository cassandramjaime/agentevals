openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: evaluate
    description: Agent trust evaluation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /evaluate:
    post:
      operationId: startEvaluation
      tags: [evaluate]
      summary: Start agent trust evaluation
      description: Starts an evaluation pipeline that generates test scenarios, calls the agent, and scores responses. Returns results via SSE stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationRequest"
      responses:
        "200":
          description: SSE stream of evaluation progress and results
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    EvaluationRequest:
      type: object
      properties:
        agentEndpoint:
          type: string
          description: The HTTP endpoint URL for the AI agent
        claudeApiKey:
          type: string
          description: User's Claude API key for evaluation
        agentDescription:
          type: string
          description: Plain English description of what the agent does
      required:
        - agentEndpoint
        - claudeApiKey
        - agentDescription
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
